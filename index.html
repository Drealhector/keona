<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keona</title>
  <style>
    :root { --bg:#0d0d0f; --panel:#17171b; --line:#2a2a31; --accent:#0f766e; --text:#eee; --dim:#9ca3af; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 18px; }
    h1 { text-align: center; letter-spacing: 1px; margin: 4px 0 16px; }
    .wrap { max-width: 920px; margin: 0 auto; display: grid; gap: 18px; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 14px; }
    .panel h2 { margin: 0 0 10px; font-size: 16px; color: var(--dim); font-weight: 600; }

    /* chat */
    #messages { max-height: 320px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
    .bubble { padding: 9px 13px; border-radius: 12px; max-width: 80%; font-size: 15px; line-height: 1.45; white-space: pre-wrap; }
    .me { align-self: flex-end; background: #1f2937; }
    .keona { align-self: flex-start; background: #0f766e; }
    .chatrow { display: flex; gap: 8px; align-items: center; }
    #msg { flex: 1; font-size: 16px; padding: 12px; border-radius: 10px; border: 1px solid var(--line); background: #0d0d0f; color: var(--text); }
    .btn { font-size: 15px; padding: 11px 16px; border: 0; border-radius: 10px; background: var(--accent); color: #fff; cursor: pointer; }
    .btn.send { background: #ea580c; }
    #chatImgLabel { font-size: 13px; color: var(--dim); cursor: pointer; padding: 6px; }
    #chatImgName { font-size: 12px; color: #fbbf24; }

    /* add eye */
    .addrow { display: flex; gap: 8px; flex-wrap: wrap; }
    .addrow input { font-size: 15px; padding: 11px; border-radius: 10px; border: 1px solid var(--line); background: #0d0d0f; color: var(--text); }
    #newName { flex: 1; min-width: 140px; }
    #newPos { flex: 1; min-width: 140px; }
    #linkOut { display: none; margin-top: 10px; }
    #linkOut input { width: 100%; font-size: 14px; padding: 10px; border-radius: 8px; border: 1px solid var(--line); background: #0d0d0f; color: #93c5fd; }
    #linkOut .hint { font-size: 13px; color: var(--dim); margin-top: 6px; }

    /* eyes grid */
    .grid { display: flex; flex-wrap: wrap; gap: 12px; }
    .eye { background: #0d0d0f; border: 1px solid var(--line); border-radius: 12px; padding: 10px; width: 220px; cursor: pointer; }
    .eye:hover { border-color: var(--accent); }
    .eye .top { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #555; flex: none; }
    .dot.on { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
    .eye .nm { font-weight: 700; font-size: 15px; }
    .eye .ps { color: var(--dim); font-size: 12px; margin-bottom: 6px; min-height: 14px; }
    .eye img { width: 100%; border-radius: 8px; background: #000; aspect-ratio: 4/3; object-fit: cover; }
    .eye .waiting { width: 100%; aspect-ratio: 4/3; border-radius: 8px; background: #000; display: flex; align-items: center; justify-content: center; color: var(--dim); font-size: 13px; }
    #emptyEyes { color: var(--dim); font-size: 14px; }

    /* viewer */
    #viewer { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 20; align-items: center; justify-content: center; flex-direction: column; padding: 20px; }
    #viewer img { max-width: 92vw; max-height: 78vh; border-radius: 12px; }
    #viewer .vname { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
    #viewer .close { margin-top: 14px; }
  </style>
</head>
<body>
  <h1>👁️ Keona</h1>
  <div class="wrap">

    <div class="panel">
      <h2>Talk to Keona</h2>
      <div id="messages"></div>
      <div class="chatrow">
        <input id="msg" placeholder="Ask Keona anything... (e.g. what do you see right now?)" />
        <label id="chatImgLabel" title="attach a picture to instruct">📎</label>
        <input type="file" id="chatImg" accept="image/*" style="display:none" />
        <button class="btn send" id="send">Send</button>
      </div>
      <div id="chatImgName"></div>
    </div>

    <div class="panel">
      <h2>Add an eye</h2>
      <div class="addrow">
        <input id="newName" placeholder="name (e.g. Front door)" />
        <input id="newPos" placeholder="position (e.g. North, facing street)" />
        <button class="btn" id="addEye">Generate eye link</button>
      </div>
      <div id="linkOut">
        <input id="linkField" readonly />
        <div class="hint">📤 Send this link to the device. Open it there, tap "Turn on this eye," and it lights up green below.</div>
      </div>
    </div>

    <div class="panel">
      <h2>Your eyes</h2>
      <div id="emptyEyes">No eyes yet — add one above.</div>
      <div class="grid" id="grid"></div>
    </div>
  </div>

  <div id="viewer">
    <div class="vname" id="vname"></div>
    <img id="vimg" />
    <button class="btn close" id="vclose">Close</button>
  </div>

  <script>
    const messages = document.getElementById("messages");
    const msgInput = document.getElementById("msg");
    const chatImg = document.getElementById("chatImg");
    const chatImgName = document.getElementById("chatImgName");
    const grid = document.getElementById("grid");
    const emptyEyes = document.getElementById("emptyEyes");
    const viewer = document.getElementById("viewer");
    const vimg = document.getElementById("vimg");
    const vname = document.getElementById("vname");

    let viewing = null; // id of the eye open in the big viewer

    function fileToDataUrl(f) {
      return new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(f); });
    }
    function bubble(text, who) {
      const b = document.createElement("div");
      b.className = "bubble " + who;
      b.textContent = text;
      messages.appendChild(b);
      messages.scrollTop = messages.scrollHeight;
      return b;
    }

    // ---- chat ----
    document.getElementById("chatImgLabel").addEventListener("click", () => chatImg.click());
    chatImg.addEventListener("change", () => { chatImgName.textContent = chatImg.files[0] ? "📎 " + chatImg.files[0].name : ""; });

    async function sendChat() {
      const text = msgInput.value.trim();
      const file = chatImg.files[0];
      if (!text && !file) return;
      bubble(text || "(sent a picture)", "me");
      msgInput.value = "";
      const thinking = bubble("…", "keona");
      try {
        const image = file ? await fileToDataUrl(file) : null;
        const d = await (await fetch("/chat", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ message: text, image }) })).json();
        thinking.textContent = d.text || d.error || "…";
      } catch (err) { thinking.textContent = "Something went wrong: " + err.message; }
      chatImg.value = ""; chatImgName.textContent = "";
    }
    document.getElementById("send").addEventListener("click", sendChat);
    msgInput.addEventListener("keydown", (e) => { if (e.key === "Enter") sendChat(); });

    // ---- add eye ----
    document.getElementById("addEye").addEventListener("click", async () => {
      const name = document.getElementById("newName").value.trim();
      const pos = document.getElementById("newPos").value.trim();
      if (!name) { alert("Give the eye a name first."); return; }
      const d = await (await fetch("/create-eye", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name, pos }) })).json();
      const link = location.origin + "/join?eye=" + d.id;
      document.getElementById("linkField").value = link;
      document.getElementById("linkOut").style.display = "block";
      document.getElementById("linkField").select();
      document.getElementById("newName").value = ""; document.getElementById("newPos").value = "";
      refresh();
    });

    // ---- eyes grid ----
    const cards = {};
    async function refresh() {
      const { eyes } = await (await fetch("/eyes")).json();
      emptyEyes.style.display = eyes.length ? "none" : "block";
      const ids = new Set(eyes.map((e) => e.id));
      for (const id in cards) { if (!ids.has(id)) { cards[id].root.remove(); delete cards[id]; } }
      for (const e of eyes) {
        if (!cards[e.id]) {
          const root = document.createElement("div");
          root.className = "eye";
          root.innerHTML = "<div class='top'><span class='dot'></span><span class='nm'></span></div><div class='ps'></div><div class='view'></div>";
          root.querySelector(".nm").textContent = e.name;
          root.querySelector(".ps").textContent = e.pos || "";
          root.addEventListener("click", () => openViewer(e.id, e.name));
          grid.appendChild(root);
          cards[e.id] = { root, dot: root.querySelector(".dot"), view: root.querySelector(".view") };
        }
        const c = cards[e.id];
        c.dot.className = "dot" + (e.online ? " on" : "");
        if (e.online) c.view.innerHTML = "<img src='/frame?id=" + e.id + "&t=" + Date.now() + "'>";
        else c.view.innerHTML = "<div class='waiting'>waiting to go live…</div>";
      }
      if (viewing && ids.has(viewing)) vimg.src = "/frame?id=" + viewing + "&t=" + Date.now();
    }
    setInterval(refresh, 2000); refresh();

    // ---- viewer ----
    function openViewer(id, name) { viewing = id; vname.textContent = name; vimg.src = "/frame?id=" + id + "&t=" + Date.now(); viewer.style.display = "flex"; }
    document.getElementById("vclose").addEventListener("click", () => { viewing = null; viewer.style.display = "none"; });

    bubble("Hi, I'm Keona 👁️ Add an eye, then ask me what I see.", "keona");
  </script>
</body>
</html>
